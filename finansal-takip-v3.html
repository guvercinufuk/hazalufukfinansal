<script>

(function poll(){
  if(!window.__fbReady||!window.React||!window.ReactDOM){return setTimeout(poll,50);}
  startApp();

function startApp(){
const h=React.createElement;
const{useState,useEffect,useCallback,useRef,useMemo}=React;
const fb=window.__fb;

// ── Sabitler ──────────────────────────────────────────────────────────────────
const DB="fin-v3",USERS=["Hazal","Ufuk"],EMAP={"hazalibis@gmail.com":"Hazal","ufuk225@gmail.com":"Ufuk"};
const DEF_KUR={usdtry:34,eurtry:37,altinGram:3200};
const NAKIT_K=["Market","Ulaşım","Sağlık","Kişisel Bakım","Diğer"];
const GELIR_K=["Maaş","Kira Geliri","Ek İş","Temettü","Diğer"];
const KK_RENK=["#8b5cf6","#3b82f6","#10b981","#f59e0b","#ef4444","#ec4899","#06b6d4"];
const IKONLAR=["🏠","✈️","🚗","🎓","💍","👶","🏖️","💻","🛡️","💰","🎯","🌟"];
const KRIPTO=[{id:"bitcoin",s:"BTC",a:"Bitcoin"},{id:"ethereum",s:"ETH",a:"Ethereum"},{id:"binancecoin",s:"BNB",a:"BNB"},{id:"solana",s:"SOL",a:"Solana"},{id:"ripple",s:"XRP",a:"XRP"},{id:"dogecoin",s:"DOGE",a:"Dogecoin"},{id:"tether",s:"USDT",a:"Tether"}];

// ── Yardımcılar ───────────────────────────────────────────────────────────────
const TRY=n=>new Intl.NumberFormat("tr-TR",{style:"currency",currency:"TRY",maximumFractionDigits:0}).format(n||0);
const N=(n,d=2)=>new Intl.NumberFormat("tr-TR",{maximumFractionDigits:d}).format(n||0);
const PCT=n=>(n>=0?"+":"")+n.toFixed(1)+"%";
const uid=()=>Math.random().toString(36).slice(2,9);
const toN=s=>parseFloat((s||"0").toString().replace(",","."))||0;
const mk=d=>d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
const ml=k=>{const[y,m]=k.split("-");return new Date(+y,+m-1).toLocaleDateString("tr-TR",{month:"long",year:"numeric"});};
const pm=k=>{const d=new Date(k+"-01");d.setMonth(d.getMonth()-1);return mk(d);};
const nm=k=>{const d=new Date(k+"-01");d.setMonth(d.getMonth()+1);return mk(d);};
const ratio=(v,t)=>t>0?Math.min(100,Math.round((v/t)*100)):0;

// ── Stiller ───────────────────────────────────────────────────────────────────
const BG="#0a0e1a",SF="#111827",BD="#1e2d42",BDL="#243350";
const PR="#7c3aed",PRL="#a78bfa",GR="#10b981",RD="#ef4444",BL="#3b82f6",AM="#f59e0b",OR="#f97316",CY="#06b6d4";
const TX="#f0f4ff",TM="#94a3b8",TD="#4b6080",TF="#2a3f5a";
const sC={backgroundColor:SF,border:"1px solid "+BD,borderRadius:14,padding:"14px 16px",marginBottom:10};
const sB={background:"linear-gradient(135deg,#111e36,#0d1525)",border:"1px solid "+BDL,borderRadius:16,padding:"18px 18px 16px",marginBottom:10};
const sM={backgroundColor:SF,border:"1px solid "+BD,borderRadius:12,padding:"12px 14px"};
const sI={width:"100%",backgroundColor:"#080d18",border:"1px solid "+BD,borderRadius:10,padding:"12px 13px",color:TX,fontSize:16,outline:"none"};
const sS={...sI,appearance:"none"};
const sBP={backgroundColor:PR,color:"#fff",border:"none",borderRadius:10,padding:"12px 18px",fontSize:14,fontWeight:600,cursor:"pointer"};
const sBSm={backgroundColor:PR,color:"#fff",border:"none",borderRadius:8,padding:"5px 12px",fontSize:12,fontWeight:600,cursor:"pointer"};
const sBOut={background:"none",border:"1px solid "+BD,borderRadius:8,color:TM,fontSize:11,padding:"5px 10px",cursor:"pointer"};
const sBDel={background:"none",border:"none",color:TF,cursor:"pointer",fontSize:16,padding:"2px 6px"};
const sOv={position:"fixed",inset:0,backgroundColor:"rgba(5,10,20,0.92)",zIndex:100,display:"flex",alignItems:"flex-end",justifyContent:"center"};
const sSh={backgroundColor:"#111d30",border:"1px solid "+BDL,borderRadius:"20px 20px 0 0",padding:"0 20px calc(env(safe-area-inset-bottom,16px) + 24px)",width:"100%",maxWidth:580,maxHeight:"90dvh",overflowY:"auto"};

// ── Veri ──────────────────────────────────────────────────────────────────────
function defB(){return{nakitTL:{value:0,note:""},nakitUSD:{value:0,note:""},nakitEUR:{value:0,note:""},vadeli:{value:0,note:""},gayrimenkul:{value:0,note:""},arac:{value:0,note:""},altin:{fiziksel:{gram:0,alis:0},banka:{gram:0,alis:0}},bist:[],abd:[],kripto:[],bes:[],fonlar:[],krediBorcu:{value:0,note:""},aylikTaksit:{value:0,note:""},digerBorc:{value:0,note:""}};}
function defU(){return{bilanco:defB(),kartlar:[],aylik:{},hedefler:[]};}
function defD(){return{Hazal:defU(),Ufuk:defU()};}
function merge(r){return{bilanco:Object.assign(defB(),r?.bilanco||{}),kartlar:r?.kartlar||[],aylik:r?.aylik||{},hedefler:r?.hedefler||[]};}

function calcVar(ud,kr){
  const b=ud.bilanco||defB(),u=kr.usdtry||34,e=kr.eurtry||37,g=kr.altinGram||0;
  let t=0;
  t+=b.nakitTL?.value||0;t+=(b.nakitUSD?.value||0)*u;t+=(b.nakitEUR?.value||0)*e;
  t+=b.vadeli?.value||0;t+=b.gayrimenkul?.value||0;t+=b.arac?.value||0;
  t+=((b.altin?.fiziksel?.gram||0)+(b.altin?.banka?.gram||0))*g;
  (b.bist||[]).forEach(x=>{t+=x.adet*(x.gun||x.alis||0);});
  (b.abd||[]).forEach(x=>{t+=x.adet*(x.gun||x.alis||0)*u;});
  (b.kripto||[]).forEach(x=>{t+=x.adet*(x.gun||x.alis||0)*u;});
  (b.bes||[]).forEach(x=>{t+=(x.toplam||0)+(x.devlet||0);});
  (b.fonlar||[]).forEach(x=>{t+=x.adet*(x.gun||x.alis||0);});
  return t;
}
function calcBor(ud){const b=ud.bilanco||defB();return(b.krediBorcu?.value||0)+(b.digerBorc?.value||0);}
function calcNet(ud,kr){return calcVar(ud,kr)-calcBor(ud);}

function ensureM(d,u,m){
  if(!d[u].aylik[m])d[u].aylik[m]={};
  const ay=d[u].aylik[m];
  if(!ay.gelirler)ay.gelirler=[];
  if(!ay.ekstreler)ay.ekstreler=[];
  if(!ay.nakit)ay.nakit=[];
  return d;
}
function getM(data,u,m){const ay=data[u]?.aylik?.[m]||{};return{gelirler:ay.gelirler||[],ekstreler:ay.ekstreler||[],nakit:ay.nakit||[]};}

// ── Atom Bileşenler ───────────────────────────────────────────────────────────
function FL(props){return h("div",{style:{fontSize:11,color:TD,marginBottom:6,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.6px"}},props.children);}
function SecH({title,btn,onBtn,nomt}){
  return h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:nomt?8:20,marginBottom:8}},
    h("span",{style:{fontSize:11,fontWeight:700,color:TD,textTransform:"uppercase",letterSpacing:"1.2px"}},title),
    btn?h("button",{style:sBSm,onClick:onBtn},btn):null
  );
}
function FInp({label,value,onChange,type,placeholder,hint,prefix}){
  return h("div",{style:{marginBottom:14}},
    h(FL,null,label),
    h("div",{style:{position:"relative"}},
      prefix?h("span",{style:{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",color:TM,fontSize:14,pointerEvents:"none"}},prefix):null,
      h("input",{style:prefix?{...sI,paddingLeft:28}:sI,type:type||"text",value:value||"",placeholder:placeholder||"",onChange:e=>onChange(e.target.value)})
    ),
    hint?h("div",{style:{fontSize:11,color:GR,marginTop:4}},hint):null
  );
}
function FSel({label,options,labels,value,onChange}){
  return h("div",{style:{marginBottom:14}},
    h(FL,null,label),
    h("select",{style:sS,value:value,onChange:e=>onChange(e.target.value)},
      options.map((o,i)=>h("option",{key:o,value:o},labels?labels[i]:o))
    )
  );
}
function SummBox({label,n,v,b}){
  return h("div",null,
    h("div",{style:sB},
      h("div",{style:{fontSize:11,fontWeight:600,color:TD,textTransform:"uppercase",letterSpacing:"0.8px",marginBottom:6}},label||"Net Değer"),
      h("div",{style:{fontSize:30,fontWeight:800,color:n>=0?GR:RD,letterSpacing:-1}},TRY(n))
    ),
    h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}},
      h("div",{style:sM},h("div",{style:{fontSize:10,fontWeight:700,color:TD,textTransform:"uppercase",marginBottom:4}},"Toplam Varlık"),h("div",{style:{fontSize:17,fontWeight:700,color:BL}},TRY(v))),
      h("div",{style:sM},h("div",{style:{fontSize:10,fontWeight:700,color:TD,textTransform:"uppercase",marginBottom:4}},"Toplam Borç"),h("div",{style:{fontSize:17,fontWeight:700,color:RD}},TRY(b)))
    )
  );
}
function TasBar({rate}){
  const col=rate>=20?GR:rate>=10?AM:RD;
  return h("div",{style:{...sC,marginBottom:14}},
    h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:8}},
      h("span",{style:{fontSize:12,color:TM}},"Tasarruf Oranı"),
      h("span",{style:{fontSize:14,fontWeight:700,color:col}},rate>=0?"%"+rate:"—")
    ),
    h("div",{style:{height:5,background:BD,borderRadius:3,overflow:"hidden"}},
      h("div",{style:{height:"100%",width:Math.max(0,Math.min(100,rate))+"%",background:col,borderRadius:3,transition:"width 0.5s"}})
    ),
    h("div",{style:{fontSize:11,color:TD,marginTop:5}},rate>=20?"🟢 Hedefte (%20+)":rate>=10?"🟡 İyi, geliştirilebilir":"🔴 Tasarrufu artır")
  );
}
function MNav({month,onMonth}){
  const now=mk(new Date());
  return h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,background:SF,border:"1px solid "+BD,borderRadius:12,padding:"8px 4px"}},
    h("button",{style:{background:"none",border:"none",color:PR,fontSize:22,cursor:"pointer",padding:"0 12px"},onClick:()=>onMonth(pm(month))},"‹"),
    h("div",{style:{textAlign:"center"}},
      h("div",{style:{fontSize:15,fontWeight:700,color:TX}},ml(month)),
      month===now?h("div",{style:{fontSize:10,color:PR,marginTop:2}},"Bu ay"):null
    ),
    h("button",{style:{background:"none",border:"none",color:PR,fontSize:22,cursor:"pointer",padding:"0 12px"},onClick:()=>onMonth(nm(month))},"›")
  );
}
function SCard({icon,label,color,value,sub,onEdit}){
  return h("button",{style:{...sC,width:"100%",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:12},onClick:onEdit},
    h("div",{style:{width:38,height:38,borderRadius:10,backgroundColor:color+"22",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}},icon),
    h("div",{style:{flex:1,minWidth:0}},
      h("div",{style:{fontSize:13,color:TM,fontWeight:500}},label),
      sub?h("div",{style:{fontSize:11,color:TD,marginTop:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},sub):null
    ),
    h("div",{style:{textAlign:"right",flexShrink:0}},
      h("div",{style:{fontSize:16,fontWeight:700,color}},TRY(value)),
      h("div",{style:{fontSize:10,color:TF,marginTop:1}},"düzenle →")
    )
  );
}
function Sheet({title,icon,sub,onClose,onSave,children}){
  return h("div",{style:sOv,onClick:onClose},
    h("div",{style:sSh,onClick:e=>e.stopPropagation()},
      h("div",{style:{width:36,height:4,background:BD,borderRadius:2,margin:"14px auto 20px"}}),
      h("div",{style:{display:"flex",alignItems:"center",gap:12,marginBottom:22}},
        icon?h("span",{style:{fontSize:26}},icon):null,
        h("div",null,
          h("div",{style:{fontSize:17,fontWeight:700,color:TX}},title),
          sub?h("div",{style:{fontSize:12,color:TD,marginTop:2}},sub):null
        )
      ),
      children,
      h("div",{style:{display:"flex",gap:10,marginTop:6}},
        h("button",{style:{...sBP,flex:"0 0 auto",backgroundColor:"transparent",border:"1px solid "+BD,color:TM},onClick:onClose},"İptal"),
        h("button",{style:{...sBP,flex:1},onClick:onSave},"Kaydet")
      )
    )
  );
}

// ── KurlarModal ───────────────────────────────────────────────────────────────
function KurlarModal({kurlar,onClose,onSave}){
  const[u,setU]=useState(String(kurlar.usdtry));
  const[e,setE]=useState(String(kurlar.eurtry));
  const[g,setG]=useState(String(kurlar.altinGram));
  return h(Sheet,{title:"Kurları Güncelle",icon:"⚙️",onClose,onSave:()=>onSave({usdtry:toN(u),eurtry:toN(e),altinGram:toN(g)})},
    h(FInp,{label:"USD / TRY",type:"number",value:u,onChange:setU}),
    h(FInp,{label:"EUR / TRY",type:"number",value:e,onChange:setE}),
    h(FInp,{label:"Gram Altın (₺)",type:"number",value:g,onChange:setG}),
    h("div",{style:{fontSize:11,color:TD,marginBottom:16}},"Her iki kullanıcı için ortak kaydedilir.")
  );
}

// ── Login ─────────────────────────────────────────────────────────────────────
function Login(){
  const[email,setEmail]=useState("");const[pw,setPw]=useState("");const[err,setErr]=useState("");const[busy,setBusy]=useState(false);
  async function login(){
    if(!email||!pw){setErr("Email ve şifre gerekli.");return;}
    if(!EMAP[email.toLowerCase().trim()]){setErr("Bu hesabın erişim izni yok.");return;}
    setBusy(true);setErr("");
    try{await fb.signIn(fb.auth,email.trim(),pw);}
    catch{setErr("Email veya şifre hatalı.");setBusy(false);}
  }
  return h("div",{style:{minHeight:"100dvh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:BG,padding:24}},
    h("div",{style:{width:64,height:64,borderRadius:20,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:30,marginBottom:20}},"💰"),
    h("div",{style:{fontSize:22,fontWeight:800,color:TX,marginBottom:4,letterSpacing:-0.5}},"Finansal Takip"),
    h("div",{style:{fontSize:13,color:TD,marginBottom:36}},"Hazal & Ufuk"),
    h("div",{style:{width:"100%",maxWidth:340}},
      h(FL,null,"Email"),
      h("input",{style:{...sI,marginBottom:14},type:"email",placeholder:"email@gmail.com",value:email,onChange:e=>setEmail(e.target.value),onKeyDown:e=>e.key==="Enter"&&login()}),
      h(FL,null,"Şifre"),
      h("input",{style:{...sI,marginBottom:20},type:"password",placeholder:"••••••••",value:pw,onChange:e=>setPw(e.target.value),onKeyDown:e=>e.key==="Enter"&&login()}),
      err?h("div",{style:{fontSize:13,color:RD,marginBottom:14,textAlign:"center"}},err):null,
      h("button",{style:{...sBP,width:"100%",opacity:busy?0.7:1},onClick:login,disabled:busy},busy?"Giriş yapılıyor…":"Giriş Yap")
    )
  );
}

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const[authUser,setAuthUser]=useState(undefined);
  const[data,setData]=useState(null);
  const[kurlar,setKurlar]=useState(DEF_KUR);
  const[saving,setSaving]=useState(false);
  const[userTab,setUserTab]=useState(null);
  const[secTab,setSecTab]=useState("bilanco");
  const[month,setMonth]=useState(mk(new Date()));
  const[modal,setModal]=useState(null);
  const tmr=useRef(null);

  useEffect(()=>{
    const unsub=fb.onAuth(fb.auth,u=>{
      setAuthUser(u);
      if(u)setUserTab(EMAP[u.email?.toLowerCase()]||"Hazal");
    });
    return unsub;
  },[]);

  useEffect(()=>{
    if(!authUser)return;
    const u1=fb.onValue(fb.ref(fb.db,DB),snap=>{
      const v=snap.val();const d=defD();
      if(v)USERS.forEach(u=>{if(v[u])d[u]=merge(v[u]);});
      setData(d);
    });
    const u2=fb.onValue(fb.ref(fb.db,DB+"-kurlar"),snap=>{
      const v=snap.val();if(v)setKurlar(Object.assign({},DEF_KUR,v));
    });
    return()=>{u1();u2();};
  },[authUser]);

  const saveFb=useCallback((path,val)=>{
    setSaving(true);clearTimeout(tmr.current);
    tmr.current=setTimeout(()=>{fb.set(fb.ref(fb.db,path),val).then(()=>setSaving(false)).catch(()=>setSaving(false));},600);
  },[]);

  const update=useCallback(fn=>{
    setData(prev=>{const nd=fn(JSON.parse(JSON.stringify(prev)));saveFb(DB,nd);return nd;});
  },[saveFb]);

  const saveKur=useCallback(k=>{setKurlar(k);saveFb(DB+"-kurlar",k);},[saveFb]);

  if(authUser===undefined)return h("div",{style:{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:BG}},h("div",{className:"sp"}));
  if(!authUser)return h(Login);
  if(!data)return h("div",{style:{minHeight:"100dvh",display:"flex",alignItems:"center",justifyContent:"center",background:BG}},h("div",{className:"sp"}));

  const myName=EMAP[authUser.email?.toLowerCase()]||"Hazal";
  const other=USERS.find(u=>u!==myName);
  const tabs=[myName,other,"Birleşik"];
  const secs=[{k:"bilanco",l:"📊 Bilanço"},{k:"aylik",l:"📅 Aylık"},{k:"hedefler",l:"🎯 Hedefler"},{k:"analiz",l:"📈 Analiz"}];
  const cm=()=>setModal(null);
  const sm=fn=>{update(fn);cm();};
  const om=obj=>setModal({...obj,type:"add"});

  function tabBtn(t){return h("button",{key:t,style:{flex:"0 0 auto",background:"none",border:"none",color:userTab===t?TX:TD,padding:"10px 14px",cursor:"pointer",fontSize:13,fontWeight:userTab===t?600:400,borderBottom:userTab===t?"2px solid "+PR:"2px solid transparent"},onClick:()=>setUserTab(t)},t);}
  function secBtn({k,l}){return h("button",{key:k,style:{flex:"0 0 auto",background:"none",border:"none",color:secTab===k?PRL:TD,padding:"8px 12px",cursor:"pointer",fontSize:12,fontWeight:secTab===k?600:400,borderBottom:secTab===k?"2px solid "+PR:"2px solid transparent"},onClick:()=>setSecTab(k)},l);}

  return h("div",{style:{minHeight:"100dvh",background:BG,paddingBottom:60}},
    h("header",{style:{background:"#0d1525",borderBottom:"1px solid "+BD,position:"sticky",top:0,zIndex:50}},
      h("div",{style:{padding:"env(safe-area-inset-top,14px) 16px 0"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
          h("div",{style:{display:"flex",alignItems:"center",gap:10}},
            h("div",{style:{width:32,height:32,borderRadius:10,background:"linear-gradient(135deg,#7c3aed,#3b82f6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16}},"💰"),
            h("div",null,h("div",{style:{fontSize:17,fontWeight:700,color:TX}},"Finansal Takip"),h("div",{style:{fontSize:11,color:TD}},"Merhaba, "+myName+" 👋"))
          ),
          h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            saving?h("span",{style:{fontSize:10,color:TD}},"kaydediliyor…"):null,
            h("button",{style:sBOut,onClick:()=>setModal({type:"kurlar"})},"⚙️ Kurlar"),
            h("button",{style:sBOut,onClick:()=>{fb.signOut(fb.auth);setData(null);}},"Çıkış")
          )
        ),
        h("div",{style:{display:"flex",overflowX:"auto",borderBottom:"1px solid "+BD}},tabs.map(tabBtn))

function Analiz({data,kurlar,userTab}){
  const pieRef=useRef(null),barRef=useRef(null),piI=useRef(null),baI=useRef(null);
  const users=userTab==="Birleşik"?USERS:[userTab];
  const usd=kurlar.usdtry||34,eur=kurlar.eurtry||37,gp=kurlar.altinGram||0;
  const dag=useMemo(()=>{
    const cats={"Nakit TL":0,"Nakit $":0,"Nakit €":0,"Vadeli":0,"Altın":0,"BIST":0,"ABD":0,"Kripto":0,"BES":0,"Fonlar":0,"Gayrimenkul":0,"Araç":0};
    users.forEach(u=>{const b=data[u]?.bilanco||defB();
      cats["Nakit TL"]+=b.nakitTL?.value||0;cats["Nakit $"]+=(b.nakitUSD?.value||0)*usd;cats["Nakit €"]+=(b.nakitEUR?.value||0)*eur;
      cats["Vadeli"]+=b.vadeli?.value||0;cats["Altın"]+=((b.altin?.fiziksel?.gram||0)+(b.altin?.banka?.gram||0))*gp;
      (b.bist||[]).forEach(x=>{cats["BIST"]+=x.adet*(x.gun||x.alis||0);});
      (b.abd||[]).forEach(x=>{cats["ABD"]+=x.adet*(x.gun||x.alis||0)*usd;});
      (b.kripto||[]).forEach(x=>{cats["Kripto"]+=x.adet*(x.gun||x.alis||0)*usd;});
      (b.bes||[]).forEach(x=>{cats["BES"]+=(x.toplam||0)+(x.devlet||0);});
      (b.fonlar||[]).forEach(x=>{cats["Fonlar"]+=x.adet*(x.gun||x.alis||0);});
      cats["Gayrimenkul"]+=b.gayrimenkul?.value||0;cats["Araç"]+=b.arac?.value||0;
    });
    return Object.entries(cats).filter(([,v])=>v>0).map(([l,v])=>({l,v}));
  },[data,kurlar,userTab]);
